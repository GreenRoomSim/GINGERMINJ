<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="logo.png">
  <title>Drag Race Simulator</title>
  <style>
    :root {
      --bg: #eefbe7;
      --card: #ffffff;
      --card-2: #f8fff3;
      --ink: #20311f;
      --muted: #61705e;
      --lime: #9be564;
      --lime-2: #c5f29b;
      --lime-3: #e8ffd8;
      --border: #d8efc9;
      --shadow: 0 12px 34px rgba(76, 110, 50, 0.12);
      --danger: #ef6b6b;
      --gold: #d7b45a;
      --low: #f2c95d;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(180deg, #f4ffe9 0%, var(--bg) 100%);
      color: var(--ink);
      min-height: 100vh;
      padding: 20px;
    }

    .container { max-width: 900px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 30px; }
    
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }

    .grid-inputs {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }

    label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 5px; color: var(--muted); }
    input {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--card-2);
    }

    button {
      cursor: pointer;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      transition: all 0.2s ease;
      background: var(--lime);
      color: var(--ink);
    }

    button:hover { filter: brightness(0.95); transform: translateY(-1px); }
    .btn-secondary { background: var(--lime-3); border: 1px solid var(--border); }
    .btn-danger { background: var(--danger); color: white; }

    #cast-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
      margin-top: 20px;
    }

    .queen-badge {
      background: var(--lime-3);
      padding: 8px;
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
    }

    .hidden { display: none; }
    .log-entry { margin-bottom: 10px; padding: 10px; border-bottom: 1px solid var(--border); }
    .winner-text { color: var(--gold); font-weight: bold; font-size: 1.2rem; }

    /* Season standings / track record table */
    #standings-area {
      margin-bottom: 18px;
      padding: 18px;
      background: linear-gradient(180deg, #ffffff 0%, #f7fbf4 100%);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
    }

    #standings-area h3 {
      margin: 0 0 12px;
      font-size: 1rem;
      letter-spacing: 0.02em;
    }

    .table-scroll {
      overflow-x: auto;
      border: 1px solid #cfdcc4;
      border-radius: 12px;
      background: #ececec;
    }

    .standings-table {
      width: 100%;
      min-width: 760px;
      border-collapse: collapse;
      table-layout: fixed;
      background: #d8d8d8;
      font-size: 0.88rem;
    }

    .standings-table th,
    .standings-table td {
      border: 1px solid #b8b8b8;
      text-align: center;
      vertical-align: middle;
      padding: 8px 6px;
      line-height: 1.05;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .standings-table thead th {
      background: #c6c6c6;
      color: #111;
      font-weight: 800;
      text-transform: none;
    }

    .rank-col {
      width: 70px;
    }

    .queen-col {
      width: 150px;
      text-align: left !important;
      padding-left: 10px !important;
    }

    .photo-col {
      width: 72px;
    }

    .episode-head {
      min-width: 105px;
      padding: 6px 4px 4px;
    }

    .episode-title {
      font-weight: 800;
      font-size: 0.92rem;
      margin-bottom: 4px;
    }

    .mini-label {
      display: block;
      font-size: 0.62rem;
      font-weight: 700;
      opacity: 0.85;
      letter-spacing: 0.03em;
      white-space: nowrap;
    }

    .queen-cell {
      text-align: left !important;
      font-weight: 700;
      background: #f4f4f4;
    }

    .queen-photo {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      margin: 0 auto;
      display: grid;
      place-items: center;
      font-size: 0.76rem;
      font-weight: 800;
      color: #1b1b1b;
      background: linear-gradient(135deg, #ffffff 0%, #e6e6e6 100%);
      border: 1px solid #bcbcbc;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
    }

    .status-cell {
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .status-safe { background: #ffffff; color: #222; }
    .status-high { background: #cfe9fb; color: #0d4a72; }
    .status-win { background: #0f58a8; color: #ffffff; }
    .status-low { background: #f5c3b9; color: #8b2f24; }
    .status-btm2 { background: #de1010; color: #ffffff; }
    .status-elm { background: #8f3734; color: #ffffff; }

    .status-empty {
      background: #d9d9d9;
      color: #8a8a8a;
      font-weight: 600;
    }

    .placement-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 42px;
      height: 26px;
      padding: 0 10px;
      border-radius: 999px;
      background: #ededed;
      border: 1px solid #c7c7c7;
      font-weight: 800;
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>Drag Race Simulator</h1>
  </header>

  <div id="setup-area" class="card">
    <h3>Add a Queen</h3>
    <div class="grid-inputs">
      <div>
        <label>Name</label>
        <input type="text" id="q-name" placeholder="Name...">
      </div>
      <div>
        <label>Comedy</label>
        <input type="number" id="q-comedy" value="5" min="1" max="15">
      </div>
      <div>
        <label>Design</label>
        <input type="number" id="q-design" value="5" min="1" max="15">
      </div>
      <div>
        <label>Acting</label>
        <input type="number" id="q-acting" value="5" min="1" max="15">
      </div>
      <div>
        <label>Lip Sync</label>
        <input type="number" id="q-lipsync" value="5" min="1" max="15">
      </div>
    </div>
    
    <div style="display: flex; gap: 10px; flex-wrap: wrap;">
      <button id="add-queen-btn">Add Queen</button>
      <button id="export-btn" class="btn-secondary">Export JSON</button>
      <input type="file" id="import-input" class="hidden" accept=".json">
      <button id="import-trigger" class="btn-secondary">Import JSON</button>
      <button id="start-btn" style="background: var(--ink); color: white; margin-left: auto;">Start Season</button>
    </div>

    <div id="cast-list"></div>
  </div>

  <div id="game-area" class="card hidden">
    <div id="standings-area">
      <h3>Season Standings</h3>
      <div class="table-scroll">
        <table class="standings-table" id="standings-table"></table>
      </div>
    </div>
    <div id="episode-log"></div>
    <button id="next-ep-btn">Next Episode</button>
  </div>
</div>

<script>
  // State Management
  const state = {
    queens: [],
    currentEpisode: 1,
    isGameOver: false,
    episodeHistory: []
  };

  // Selectors
  const el = {
    qName: document.getElementById('q-name'),
    qComedy: document.getElementById('q-comedy'),
    qDesign: document.getElementById('q-design'),
    qActing: document.getElementById('q-acting'),
    qLipsync: document.getElementById('q-lipsync'),
    addBtn: document.getElementById('add-queen-btn'),
    startBtn: document.getElementById('start-btn'),
    castList: document.getElementById('cast-list'),
    setupArea: document.getElementById('setup-area'),
    gameArea: document.getElementById('game-area'),
    log: document.getElementById('episode-log'),
    nextBtn: document.getElementById('next-ep-btn'),
    exportBtn: document.getElementById('export-btn'),
    importInput: document.getElementById('import-input'),
    importTrigger: document.getElementById('import-trigger')
  };

  // Helper Functions
  const getRandom = (arr) => arr[Math.floor(Math.random() * arr.length)];
  const roll = (stat) => Math.floor(Math.random() * stat) + Math.floor(Math.random() * 5);

  const ordinal = (n) => {
    const suffix = n % 100 >= 11 && n % 100 <= 13 ? 'th' : ({1: 'st', 2: 'nd', 3: 'rd'}[n % 10] || 'th');
    return `${n}${suffix}`;
  };

  const initials = (name) => name
    .trim()
    .split(/\s+/)
    .slice(0, 2)
    .map(part => part[0] || '')
    .join('')
    .toUpperCase();

  const statusClass = (status) => {
    const map = {
      SAFE: 'status-safe',
      HIGH: 'status-high',
      WIN: 'status-win',
      LOW: 'status-low',
      BTM2: 'status-btm2',
      ELIM: 'status-elm',
      '-': 'status-empty'
    };
    return map[status] || 'status-empty';
  };

  function renderStandingsTable() {
    const table = document.getElementById('standings-table');
    if (!table) return;

    const episodes = state.episodeHistory;
    const orderedQueens = [...state.queens].sort((a, b) => {
      const ap = a.placement ?? Number.POSITIVE_INFINITY;
      const bp = b.placement ?? Number.POSITIVE_INFINITY;
      if (ap !== bp) return ap - bp;
      return (a._order ?? 0) - (b._order ?? 0);
    });

    const headTop = `
      <tr>
        <th class="rank-col" rowspan="2">Rank</th>
        <th class="queen-col" rowspan="2">Queen</th>
        <th class="photo-col" rowspan="2">Photo</th>
        ${episodes.map(ep => `<th class="episode-head">EP. ${ep.number}</th>`).join('')}
      </tr>
    `;

    const headBottom = `
      <tr>
        ${episodes.map(ep => `
          <th class="episode-head">
            <div class="episode-title">${ep.maxi}</div>
            <span class="mini-label">${ep.mini || '-'}</span>
          </th>
        `).join('')}
      </tr>
    `;

    const bodyRows = orderedQueens.map(q => {
      const rank = q.placement ? `<span class="placement-pill">${ordinal(q.placement)}</span>` : '<span class="placement-pill">-</span>';
      const photo = q.photo || q.image
        ? `<img src="${q.photo || q.image}" alt="${q.name}" class="queen-photo" style="object-fit: cover;" />`
        : `<div class="queen-photo">${initials(q.name)}</div>`;

      const cells = episodes.map(ep => {
        const status = ep.results[q.name] || '-';
        return `<td class="status-cell ${statusClass(status)}">${status}</td>`;
      }).join('');

      return `
        <tr>
          <td>${rank}</td>
          <td class="queen-cell">${q.name}</td>
          <td>${photo}</td>
          ${cells}
        </tr>
      `;
    }).join('');

    table.innerHTML = `${headTop}${headBottom}<tbody>${bodyRows}</tbody>`;
  }

  // Logic: Add Queen
  function addQueen() {
    if (!el.qName.value) return alert("Enter a name!");
    const queen = {
      name: el.qName.value,
      comedy: parseInt(el.qComedy.value),
      design: parseInt(el.qDesign.value),
      acting: parseInt(el.qActing.value),
      lip_sync: parseInt(el.qLipsync.value),
      eliminated: false,
      placement: null,
      _order: state.queens.length
    };
    state.queens.push(queen);
    el.qName.value = "";
    updateCastUI();
    renderStandingsTable();
  }

  function updateCastUI() {
    el.castList.innerHTML = state.queens.map((q, i) => `
      <div class="queen-badge">
        <span>${q.name}</span>
        <button class="btn-danger" style="padding: 2px 6px; font-size: 10px;" onclick="removeQueen(${i})">X</button>
      </div>
    `).join('');
  }

  window.removeQueen = (index) => {
    state.queens.splice(index, 1);
    updateCastUI();
    renderStandingsTable();
  };

  // Logic: File Handling
  el.exportBtn.addEventListener('click', () => {
    const data = JSON.stringify({ queens: state.queens });
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'cast.json';
    a.click();
  });

  el.importTrigger.addEventListener('click', () => el.importInput.click());
  el.importInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = (event) => {
      const parsed = JSON.parse(event.target.result);
      state.queens = (parsed.queens || []).map((q, i) => ({
        ...q,
        eliminated: Boolean(q.eliminated),
        placement: q.placement ?? null,
        _order: q._order ?? i
      }));
      updateCastUI();
      renderStandingsTable();
    };
    reader.readAsText(file);
  });

  // Logic: Simulation
  function startSeason() {
    if (state.queens.length < 3) return alert("Add at least 3 queens!");
    state.currentEpisode = 1;
    state.isGameOver = false;
    state.episodeHistory = [];
    state.queens.forEach((q, i) => {
      q.eliminated = false;
      q.placement = null;
      q._order = q._order ?? i;
    });
    el.setupArea.classList.add('hidden');
    el.gameArea.classList.remove('hidden');
    el.nextBtn.classList.remove('hidden');
    renderStandingsTable();
    runEpisode();
  }

  function runEpisode() {
    const activeQueens = state.queens.filter(q => !q.eliminated);

    if (activeQueens.length === 1) {
      activeQueens[0].placement = 1;
      el.log.innerHTML += `<div class="winner-text">The winner is ${activeQueens[0].name}!</div>`;
      el.nextBtn.classList.add('hidden');
      renderStandingsTable();
      return;
    }

    const challengeType = getRandom(['comedy', 'design', 'acting']);
    const episodeRecord = {
      number: state.currentEpisode,
      maxi: challengeType.charAt(0).toUpperCase() + challengeType.slice(1),
      mini: '-',
      results: {}
    };

    el.log.innerHTML = `<h3>Episode ${state.currentEpisode}: ${challengeType.toUpperCase()} Challenge</h3>`;

    // Calculate scores
    activeQueens.forEach(q => q.tempScore = roll(q[challengeType]));
    activeQueens.sort((a, b) => b.tempScore - a.tempScore);

    const winner = activeQueens[0];
    const bottom2 = activeQueens.slice(-2);

    activeQueens.forEach(q => {
      episodeRecord.results[q.name] = 'SAFE';
    });
    episodeRecord.results[winner.name] = 'WIN';
    episodeRecord.results[bottom2[0].name] = 'BTM2';
    episodeRecord.results[bottom2[1].name] = 'BTM2';

    el.log.innerHTML += `<p><strong>Winner:</strong> ${winner.name}</p>`;
    el.log.innerHTML += `<p><strong>Bottom 2:</strong> ${bottom2[0].name} and ${bottom2[1].name}</p>`;

    // Lip Sync
    const ls1 = roll(bottom2[0].lip_sync);
    const ls2 = roll(bottom2[1].lip_sync);
    const eliminated = ls1 > ls2 ? bottom2[1] : bottom2[0];

    eliminated.eliminated = true;
    eliminated.placement = activeQueens.length;
    episodeRecord.results[eliminated.name] = 'ELIM';

    if (activeQueens.length === 2) {
      winner.placement = 1;
    }

    el.log.innerHTML += `<p style="color: var(--danger)"><strong>Sashay Away:</strong> ${eliminated.name}</p>`;

    state.episodeHistory.push(episodeRecord);
    state.currentEpisode++;
    renderStandingsTable();
  }
  // Event Listeners
  el.addBtn.addEventListener('click', addQueen);
  el.startBtn.addEventListener('click', startSeason);
  el.nextBtn.addEventListener('click', runEpisode);

</script>
</body>
</html>
